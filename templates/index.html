<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Report Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .main-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            width: 100%;
            min-height: 300px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .success-message {
            background: #10b981;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .link-box {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            word-break: break-all;
        }
        
        .link-box a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .link-box a:hover {
            text-decoration: underline;
        }
        
        .reports-list {
            margin-top: 20px;
        }
        
        .report-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .report-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .copy-btn:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Daily Report Manager</h1>
            <p>Paste HTML và tạo landing page ngay lập tức</p>
        </div>
        
        <div class="main-card">
            <form id="reportForm">
                <div class="form-group">
                    <label for="title">Tên Report:</label>
                    <input type="text" id="title" name="title" placeholder="vd: nganh-xang-dau" required>
                </div>
                
                <div class="form-group">
                    <label for="htmlContent">HTML Content:</label>
                    <textarea id="htmlContent" name="htmlContent" placeholder="Paste HTML code vào đây..." required></textarea>
                </div>
                
                <button type="submit" class="btn">💾 Save & Create Landing Page</button>
            </form>
            
            <div id="successMessage" class="success-message">
                <h3>✅ Tạo thành công!</h3>
                <div class="link-box">
                    <strong>Link truy cập:</strong><br>
                    <a id="reportLink" href="#" target="_blank"></a>
                </div>
                <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
            </div>
        </div>
        
        <div class="main-card">
            <h2>📁 Danh sách Reports</h2>
            <div id="reportsList" class="reports-list"></div>
        </div>
    </div>
    
    <script>
        // Load reports on page load
        loadReports();
        
        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const htmlContent = document.getElementById('htmlContent').value;
            
            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title, html: htmlContent })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const link = data.full_url;
                    document.getElementById('reportLink').href = link;
                    document.getElementById('reportLink').textContent = link;
                    document.getElementById('successMessage').classList.add('show');
                    
                    // Clear form
                    document.getElementById('reportForm').reset();
                    
                    // Reload reports list
                    loadReports();
                    
                    // Scroll to success message
                    document.getElementById('successMessage').scrollIntoView({ behavior: 'smooth' });
                }
            } catch (error) {
                alert('Có lỗi xảy ra: ' + error.message);
            }
        });
        
        async function loadReports() {
            try {
                const response = await fetch('/api/reports');
                const reports = await response.json();
                
                const listDiv = document.getElementById('reportsList');
                
                if (reports.length === 0) {
                    listDiv.innerHTML = '<p style="color: #999;">Chưa có report nào</p>';
                    return;
                }
                
                listDiv.innerHTML = reports.map(report => `
                    <div class="report-item">
                        <a href="${report.url}" target="_blank">${report.filename}</a>
                        <button class="copy-btn" onclick="copyToClipboard('http://localhost:8000${report.url}')">📋 Copy</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading reports:', error);
            }
        }
        
        function copyLink() {
            const link = document.getElementById('reportLink').textContent;
            copyToClipboard(link);
        }
        
        function copyToClipboard(text) {
            // Replace 0.0.0.0 with localhost if present
            const fixedText = text.replace('0.0.0.0', 'localhost');
            navigator.clipboard.writeText(fixedText).then(() => {
                alert('✅ Đã copy link!');
            }).catch(err => {
                console.error('Copy failed:', err);
            });
        }
    </script>
</body>
</html>
